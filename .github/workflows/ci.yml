name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax
        run: bash -n mail-sec-audit.sh

      - name: Smoke tests
        run: bash tests/smoke.sh

      - name: ShellCheck
        run: shellcheck mail-sec-audit.sh tests/*.sh

