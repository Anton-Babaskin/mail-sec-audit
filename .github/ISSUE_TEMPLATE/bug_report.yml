name: Bug report
description: Report a reproducible problem with Mail Security Audit.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please remove sensitive hostnames, IP addresses, domains, and log lines before posting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Output version or commit SHA.
      placeholder: "2.2.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04, Debian 12"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Command used to run the script.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

